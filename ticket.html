<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boodol - Ticket</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: #1a1a1a; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app-shell { width: 100%; max-width: 420px; background-color: #Fdfbf7; height: 100vh; position: relative; overflow-y: auto; box-shadow: 0 0 40px rgba(0,0,0,0.5); padding: 20px; }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-title { font-weight: 800; font-size: 1.5rem; color: #2D5A27; }
        .logout-btn { background: none; border: none; color: #F56300; font-weight: 600; cursor: pointer; font-size: 0.9rem; }

        .qr-container { background: white; border-radius: 20px; padding: 30px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .qr-placeholder { width: 180px; height: 180px; background: #eee url('https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=Boodol123') no-repeat center; margin: 0 auto 20px; border-radius: 12px; }
        .category-tag { display: inline-block; padding: 4px 12px; background: #2D5A27; color: white; border-radius: 12px; font-size: 0.8rem; font-weight: 700; margin-top: 10px; }
        
        .map-section { margin-top: 20px; border-radius: 20px; overflow: hidden; position: relative; height: 200px; background: #ddd; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        .map-bg { width: 100%; height: 100%; background: url('https://www.ust.edu.ph/wp-content/uploads/2020/08/UST-Campus-Map-1.jpg') center/cover; filter: blur(2px) brightness(0.7); }
        .map-pin-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; }
        .pin-icon { font-size: 2.5rem; color: #F56300; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); margin-bottom: 10px; }
        
        .btn { width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 700; font-size: 1.1rem; cursor: pointer; background-color: #2D5A27; color: white; margin-top: 20px; }
    </style>
</head>
<body>
<div id="app-shell">
    <div class="header-nav">
        <div class="header-title">Order Secured</div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
    
    <div class="qr-container">
        <div class="qr-placeholder"></div>
        <h3 id="ticket-food-title" style="margin-bottom: 5px;"></h3>
        <p style="color: #666; font-size: 0.9rem;">Show this QR tomorrow to claim your meal.</p>
        <div id="ticket-category" class="category-tag"></div>
    </div>

    <div class="map-section">
        <div class="map-bg"></div>
        <div class="map-pin-overlay">
            <div class="pin-icon">📍</div>
            <h3 style="font-weight: 800; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Dapitan Food Hub</h3>
            <p style="font-size: 0.85rem; opacity: 0.9;">1234 Dapitan St. (Beside gate)</p>
        </div>
    </div>
    
    <button class="btn" onclick="window.location.href='menu.html'">Back to Menu</button>
</div>

<script>
    if(!localStorage.getItem('boodol_user')) window.location.href = 'index.html';

    const orderData = JSON.parse(localStorage.getItem('boodol_current_order'));
    if(orderData) {
        document.getElementById('ticket-food-title').innerText = orderData.name;
        document.getElementById('ticket-category').innerText = `Diet Logged: ${orderData.category}`;
    } else {
        document.getElementById('ticket-food-title').innerText = "No active order found.";
        document.getElementById('ticket-category').style.display = 'none';
    }

    function logout() {
        localStorage.removeItem('boodol_user');
        window.location.href = 'index.html';
    }
</script>
</body>
</html>
